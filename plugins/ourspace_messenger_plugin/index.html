<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="color-scheme" content="dark light" />
  <title>OurSpace Messenger Plug-in</title>
  <link rel="stylesheet" href="css/ourspace-messenger.css" />
</head>
<body>
  <noscript>This messenger plug-in needs JavaScript enabled.</noscript>
  <main id="ourspace-messenger-root"></main>

  <script src="vendor/jeeliz/jeelizFaceFilter.js" defer></script>
  <script src="js/ourspace-backend-bridge.js" defer></script>
  <script src="js/ourspace-messenger.js" defer></script>
  <script>
    window.addEventListener('DOMContentLoaded', function () {
      window.OurSpaceMessenger.init({
        mount: '#ourspace-messenger-root',
        appName: 'OurSpace Messenger',
        mainBackendUrl: 'https://script.google.com/macros/library/d/1Ld-KR6PrFPTBs1qsdAsZ55kBUa9QRYIkLgidknvgJ-2PLtujf9D-Mt6A/1',
        onyxAlertsBackendUrl: 'https://script.google.com/macros/library/d/1OtngPSoPXDpeYa8FDD9bb7rU_0mvFvD_23niUCrfy09t5Mbk0cy0kV5l/1',
        faceModelPath: '../../json/docs/vendor/jeeliz/NN_VERYLIGHT_1.json',
        users: [
          { id: 'william', label: 'William', avatar: '🦖' },
          { id: 'jasper', label: 'Jasper', avatar: '🌙' },
          { id: 'onyx', label: 'Onyx Alerts', avatar: '🐈‍⬛', system: true }
        ],
        defaultChannel: 'home'
      });
    });
  </script>
</body>
</html>
